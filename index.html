<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Inventario TI</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
}

/* HEADER */
header {
    background: #020617;
    padding: 15px;
    text-align: center;
    font-size: 24px;
    color: #38bdf8;
    font-weight: bold;
    box-shadow: 0px 2px 10px rgba(0,0,0,0.5);
}

/* CONTENEDOR */
.container {
    width: 90%;
    margin: auto;
    margin-top: 20px;
}

/* TARJETA INFO */
.info {
    background: #1e293b;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
    box-shadow: 0px 4px 12px rgba(0,0,0,0.4);
}

/* BOTÓN */
button {
    background: #22c55e;
    border: none;
    padding: 10px 15px;
    color: white;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}

/* IFRAME */
iframe {
    width: 100%;
    height: 500px;
    border: none;
    border-radius: 10px;
    background: white;
}

/* FOOTER */
footer {
    margin-top: 20px;
    padding: 10px;
    font-size: 14px;
    color: #94a3b8;
}
</style>
</head>

<body>

<header>
📦 Sistema de Inventario TI
</header>

<div class="container">

    <div class="info">
        <p>🔹 Esta interfaz muestra los dispositivos registrados en la API.</p>
        <p>🔹 Los datos se actualizan en tiempo real desde el servidor.</p>

        <button onclick="recargar()">🔄 Recargar datos</button>
    </div>

    <iframe id="frame" src="https://api-inventario-2.onrender.com/devices"></iframe>

</div>

<footer>
Desarrollado para práctica de API REST
</footer>

<script>
function recargar() {
    document.getElementById("frame").src += "";
}
</script>

</body>
</html>
