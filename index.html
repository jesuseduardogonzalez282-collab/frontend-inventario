<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Inventario TI</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f1f5f9;
    color: #1e293b;
    text-align: center;
}

h1 {
    color: #2563eb;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 12px;
    width: 400px;
    margin: auto;
    margin-top: 30px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
}

input {
    width: 90%;
    padding: 10px;
    margin: 6px;
    border-radius: 6px;
    border: 1px solid #cbd5f5;
}

button {
    padding: 10px;
    margin: 5px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
}

.btn-guardar {
    background: #2563eb;
    color: white;
}

.btn-eliminar {
    background: #dc2626;
    color: white;
}

table {
    margin: auto;
    margin-top: 20px;
    border-collapse: collapse;
    width: 90%;
    background: white;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
}

td, th {
    border-bottom: 1px solid #e2e8f0;
    padding: 10px;
}

th {
    background: #2563eb;
    color: white;
}

tr:hover {
    background: #f1f5f9;
}
</style>

</head>

<body>

<h1>📊 Sistema de Inventario</h1>

<div class="container">
    <input id="nombre" placeholder="Nombre del dispositivo">
    <input id="tipo" placeholder="Tipo">
    <input id="estado" placeholder="Estado">
    <input id="area" placeholder="Área">

    <br>
    <button class="btn-guardar" onclick="crear()">Guardar</button>
</div>

<h2>📋 Dispositivos registrados</h2>

<table id="tabla">
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Tipo</th>
<th>Estado</th>
<th>Área</th>
<th>Acción</th>
</tr>
</table>

<script>
const API = "https://api-inventario-iaww.onrender.com/devices";

function cargar() {
    fetch(API)
    .then(res => res.json())
    .then(data => {
        let tabla = document.getElementById("tabla");

        tabla.innerHTML = `
        <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Tipo</th>
        <th>Estado</th>
        <th>Área</th>
        <th>Acción</th>
        </tr>`;

        data.forEach(d => {
            tabla.innerHTML += `
            <tr>
                <td>${d.id}</td>
                <td>${d.nombre}</td>
                <td>${d.tipo}</td>
                <td>${d.estado}</td>
                <td>${d.area}</td>
                <td>
                    <button class="btn-eliminar" onclick="eliminar(${d.id})">Eliminar</button>
                </td>
            </tr>`;
        });
    });
}

function crear() {
    fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            nombre: document.getElementById("nombre").value,
            tipo: document.getElementById("tipo").value,
            estado: document.getElementById("estado").value,
            area: document.getElementById("area").value
        })
    })
    .then(() => {
        limpiar();
        cargar();
    });
}

function eliminar(id) {
    fetch(API + "/" + id, {
        method: "DELETE"
    })
    .then(() => cargar());
}

function limpiar() {
    document.getElementById("nombre").value = "";
    document.getElementById("tipo").value = "";
    document.getElementById("estado").value = "";
    document.getElementById("area").value = "";
}

cargar();
</script>

</body>
</html>
